name: Android Release (Dioxus)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to use for the release (only needed for manual dispatch)"
        required: false

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    # Java 17, Android SDK y Rust ya vienen preinstalados en ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          # Clave extra para Android (targets distintos al host)
          key: android-release

      - name: Install dx (dioxus cli)
        run: |
          # Intentar restaurar caché de dx para evitar reinstalarlo en cada run
          if ! command -v dx &>/dev/null; then
            curl -sSL http://dioxus.dev/install.sh -o /tmp/dx_install.sh
            bash /tmp/dx_install.sh
          fi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Prepare keystore.properties (from secrets)
        env:
          KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          # El JKS va dentro del workspace para que la ruta relativa funcione con Dioxus
          JKS_PATH="$GITHUB_WORKSPACE/keystore.jks"
          base64 -d <<< "$KEY_BASE64" > "$JKS_PATH"
          chmod 600 "$JKS_PATH"
          # Crear keystore.properties igual que en la guía oficial
          echo "password=$KEY_PASSWORD"  >  keystore.properties
          echo "keyAlias=$KEY_ALIAS"     >> keystore.properties
          echo "storeFile=$JKS_PATH"     >> keystore.properties
          echo "keystore.properties creado OK"

      - name: Build Android release (dx)
        env:
          GRADLE_OPTS: "-Dandroid.lint.abortOnError=false"
        run: |
          bash scripts/android-build.sh 2>&1 | tee build-dx-output.log

      - name: Upload dx build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dx-build-log
          path: build-dx-output.log

      - name: Find APK/AAB and verify
        run: |
          echo "--- APK/AAB files ---"
          find . -type f \( -iname "*.apk" -o -iname "*.aab" \) -print
          FOUND=$(find . -type f \( -iname "*.apk" -o -iname "*.aab" \) -print -quit)
          if [ -z "$FOUND" ]; then
            echo "ERROR: no APK/AAB found"; exit 1
          fi
          # Exportar ruta para el paso de release
          echo "APK_PATH=$FOUND" >> $GITHUB_ENV

      - name: Create GitHub Release and upload APK
        if: ${{ github.ref_type == 'tag' || github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
          release_name: Release ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
          files: |
            **/build/outputs/**/*.apk
            **/build/outputs/**/*.aab
            **/*.apk
            **/*.aab
