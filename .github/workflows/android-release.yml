name: Android Release (Dioxus)

on:
  push:
    tags: # trigger on tags (create a release tag)
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Android command-line tools and SDK (platform-tools, build-tools, platforms)
        run: |
          set -e
          SDK_ROOT="$RUNNER_TEMP/android-sdk"
          mkdir -p "$SDK_ROOT/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline.zip
          unzip -q /tmp/cmdline.zip -d "$SDK_ROOT/cmdline-tools"
          mv "$SDK_ROOT/cmdline-tools/cmdline-tools" "$SDK_ROOT/cmdline-tools/latest" || true
          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$SDK_ROOT/platform-tools:$PATH"
          yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_ROOT" --licenses
          "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_ROOT" "platform-tools" "platforms;android-31" "build-tools;31.0.0"

      - name: Install dx (dioxus cli)
        run: |
          curl -sSL http://dioxus.dev/install.sh -o /tmp/dx_install.sh
          bash /tmp/dx_install.sh

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Prepare keystore and properties (from secrets)
        env:
          KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
        run: |
          set -e
          # Write keystore file
          base64 -d <<< "$KEY_BASE64" > "$GITHUB_WORKSPACE/keystore.jks"
          chmod 600 "$GITHUB_WORKSPACE/keystore.jks"
          # Create keystore.properties for Gradle to consume
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > "$GITHUB_WORKSPACE/keystore.properties"
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> "$GITHUB_WORKSPACE/keystore.properties"
          echo "storePassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> "$GITHUB_WORKSPACE/keystore.properties"
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> "$GITHUB_WORKSPACE/keystore.properties"
          echo "storeFile=$GITHUB_WORKSPACE/keystore.jks" >> "$GITHUB_WORKSPACE/keystore.properties"

      - name: Build release (dx)
        run: |
          set -e
          # Ensure dx installed is on PATH (install script puts it in ~/.cargo/bin)
          export PATH="$HOME/.cargo/bin:$PATH"
          # Build para Android (APK)
          dx build --platform android --release 2>&1 | tee build-dx-output.log

      - name: List produced APK/AAB files (debug)
        run: |
          echo "Looking for APK/AAB files..."
          find . -type f \( -iname "*.apk" -o -iname "*.aab" \) -print || true
          echo "Show build outputs for Android Gradle standard locations:"
          ls -la android || true
          ls -la android/app/build/outputs || true
          ls -la app/build/outputs || true

      - name: Verify artifacts exist
        run: |
          set -e
          echo "--- All APK/AAB files found ---"
          find . -type f \( -iname "*.apk" -o -iname "*.aab" \) -not -path '*/target/dx/*' -print || true
          FOUND=$(find . -type f \( -iname "*.apk" -o -iname "*.aab" \) -print -quit || true)
          if [ -z "$FOUND" ]; then
            echo "ERROR: No APK/AAB artifacts found. Check dx build logs above."
            exit 1
          fi
          echo "Artifact found: $FOUND"

      - name: Upload APK/AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-artifacts
          path: |
            android/app/build/outputs/**/*.apk
            android/app/build/outputs/**/*.aab
            app/build/outputs/**/*.apk
            app/build/outputs/**/*.aab
            **/build/outputs/**/*.apk
            **/build/outputs/**/*.aab
            **/*.apk
            **/*.aab

      - name: Upload dx build log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: dx-build-log
          path: build-dx-output.log

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            android/app/build/outputs/**/*.apk
            android/app/build/outputs/**/*.aab
            app/build/outputs/**/*.apk
            app/build/outputs/**/*.aab
            **/build/outputs/**/*.apk
            **/build/outputs/**/*.aab
            **/*.apk
            **/*.aab
