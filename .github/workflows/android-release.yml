name: Android Release (Dioxus)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    # Java 17, Android SDK y Rust ya vienen preinstalados en ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          # Clave extra para Android (targets distintos al host)
          key: android-release

      - name: Install dx (dioxus cli)
        run: |
          # Intentar restaurar caché de dx para evitar reinstalarlo en cada run
          if ! command -v dx &>/dev/null; then
            curl -sSL http://dioxus.dev/install.sh -o /tmp/dx_install.sh
            bash /tmp/dx_install.sh
          fi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Prepare keystore and patch Dioxus.toml (from secrets)
        env:
          KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          JKS_PATH="$RUNNER_TEMP/keystore.jks"
          base64 -d <<< "$KEY_BASE64" > "$JKS_PATH"
          chmod 600 "$JKS_PATH"
          sed -i "s|jks_file = \".*\"|jks_file = \"$JKS_PATH\"|"       Dioxus.toml
          sed -i "s|jks_alias = \".*\"|jks_alias = \"$KEY_ALIAS\"|"     Dioxus.toml
          sed -i "s|jks_password = \".*\"|jks_password = \"$KEY_PASSWORD\"|" Dioxus.toml
          sed -i "s|key_alias = \".*\"|key_alias = \"$KEY_ALIAS\"|"     Dioxus.toml
          sed -i "s|key_password = \".*\"|key_password = \"$KEY_PASSWORD\"|" Dioxus.toml
          echo "Dioxus.toml patched (passwords hidden):"
          grep -A8 '\[bundle.android\]' Dioxus.toml | sed 's/password = .*/password = ***/'

      - name: Build Android release (dx)
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT || '/usr/local/lib/android/sdk' }}
        run: |
          dx build --platform android --release 2>&1 | tee build-dx-output.log

      - name: Upload dx build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dx-build-log
          path: build-dx-output.log

      - name: Find APK/AAB and verify
        run: |
          echo "--- APK/AAB files ---"
          find . -type f \( -iname "*.apk" -o -iname "*.aab" \) -print
          FOUND=$(find . -type f \( -iname "*.apk" -o -iname "*.aab" \) -print -quit)
          if [ -z "$FOUND" ]; then
            echo "ERROR: no APK/AAB found"; exit 1
          fi
          # Exportar ruta para el paso de release
          echo "APK_PATH=$FOUND" >> $GITHUB_ENV

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            **/build/outputs/**/*.apk
            **/build/outputs/**/*.aab
            **/*.apk
            **/*.aab
