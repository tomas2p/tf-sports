name: Android Release (Dioxus)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to use for the release (only needed for manual dispatch)"
        required: false

permissions:
  contents: write

jobs:
  build-arch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        triple:
          [aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add Rust Android target
        run: rustup target add ${{ matrix.triple }}

      - name: Install dx (dioxus cli)
        run: |
          if ! command -v dx &>/dev/null; then
            curl -sSL http://dioxus.dev/install.sh -o /tmp/dx_install.sh
            bash /tmp/dx_install.sh
          fi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build for target
        env:
          CARGO_TERM_COLOR: never
        run: |
          set -e
          echo "Building target: ${{ matrix.triple }}"
          dx build --platform android --release --target ${{ matrix.triple }} 2>&1 | tee build-${{ matrix.triple }}.log || true

      - name: Upload build artifact (native libs + dx project)
        uses: actions/upload-artifact@v4
        with:
          name: dx-${{ matrix.triple }}
          path: |
            target/${{ matrix.triple }}
            target/dx
            build-${{ matrix.triple }}.log

  assemble-release:
    runs-on: ubuntu-latest
    needs: build-arch
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare keystore.properties (from secrets)
        env:
          KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          JKS_PATH="$GITHUB_WORKSPACE/keystore.jks"
          base64 -d <<< "$KEY_BASE64" > "$JKS_PATH"
          chmod 600 "$JKS_PATH"
          echo "password=$KEY_PASSWORD"  >  keystore.properties
          echo "keyAlias=$KEY_ALIAS"     >> keystore.properties
          echo "storeFile=$JKS_PATH"     >> keystore.properties

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Reconstruct target directories
        run: |
          set -e
          mkdir -p target
          for d in artifacts/*; do
            if [ -d "$d/target" ]; then
              for t in $(ls -1 "$d/target" 2>/dev/null); do
                mkdir -p "target/$t"
                cp -a "$d/target/$t/"* "target/$t/" || true
              done
            fi
            if [ -d "$d/target/dx" ] && [ ! -d "target/dx" ]; then
              mkdir -p target
              cp -a "$d/target/dx" target/
            fi
          done

      - name: Make gradlew and scripts executable
        run: |
          set -e
          echo "Setting execute permission for gradlew files and post-dx-patch.sh"
          # Make any gradlew files produced by dx executable and print them for diagnostics
          find target -type f -name gradlew -print -exec chmod +x {} + || true
          # Also check common artifact locations (in case download-artifact flattened dirs)
          find artifacts -type f -name gradlew -print -exec chmod +x {} + || true
          # Ensure the repo's post-dx-patch script is executable and show status
          if [ -f scripts/post-dx-patch.sh ]; then
            ls -l scripts/post-dx-patch.sh || true
            chmod +x scripts/post-dx-patch.sh || true
            echo "post-dx-patch.sh is now executable"
          else
            echo "Warning: scripts/post-dx-patch.sh not found in repo"
          fi

      - name: Run post-dx-patch to assemble and sign
        env:
          JKS_FILE: "$GITHUB_WORKSPACE/keystore.jks"
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          bash scripts/post-dx-patch.sh 2>&1 | tee assemble-release.log || true

      - name: Find final APKs and prepare release metadata
        run: |
          set -e
          echo "Searching for APKs in common output locations..."
          # prefer explicit manifest if produced by post-dx-patch
          APK_LIST=""
          ASSETS_FILE="app/build/outputs/apk/release/release-assets.txt"
          if [ -f "$ASSETS_FILE" ]; then
            echo "Using asset manifest: $ASSETS_FILE"
            APK_LIST=$(sed -n 's/^\s*\(.*\.apk\)\s*$/\1/p' "$ASSETS_FILE" | tr '\n' ' ')
          fi

          # fallback: search common paths and inside target/dx generated projects
          if [ -z "$APK_LIST" ]; then
            echo "No manifest — scanning filesystem for *.apk under target/dx and app/..."
            APK_LIST=$(find target/dx -type f -iname "*.apk" -print 2>/dev/null || true)
          fi
          if [ -z "$APK_LIST" ]; then
            APK_LIST=$(find app/build -type f -iname "*.apk" -print 2>/dev/null || true)
          fi
          if [ -z "$APK_LIST" ]; then
            APK_LIST=$(find . -type f -iname "*.apk" -not -path "*/intermediates/*" -not -path "*/tmp/*" -print 2>/dev/null || true)
          fi

          if [ -z "$APK_LIST" ]; then
            echo "--- Diagnostics: directory listing ---"
            echo "Workspace root listing:"
            ls -la || true
            echo "target/ listing:"
            ls -la target || true
            echo "artifacts/ listing:"
            ls -la artifacts || true
            echo "app/build listing:"
            ls -la app/build || true
            echo "assemble-release.log (if present):"
            [ -f assemble-release.log ] && sed -n '1,200p' assemble-release.log || true
            echo "ERROR: no APKs found"; exit 1
          fi

          echo "APK_FILES<<EOF" >> $GITHUB_ENV
          for f in $APK_LIST; do
            echo "$f" >> $GITHUB_ENV
          done
          echo "EOF" >> $GITHUB_ENV

          BODY_FILE="$GITHUB_WORKSPACE/release-body.txt"
          echo "Android release artifacts generated by CI" > "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "Included APKs:" >> "$BODY_FILE"
          for f in $APK_LIST; do
            if [ -f "$f" ]; then
              sz=$(du -h "$f" | cut -f1)
            else
              sz="?"
            fi
            echo "- $(basename "$f") ($sz)" >> "$BODY_FILE"
          done
          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          cat "$BODY_FILE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload assembled APKs
        uses: actions/upload-artifact@v4
        with:
          name: final-apks
          path: app/build/outputs/apk/release

      - name: Create GitHub Release and upload APKs
        if: ${{ github.ref_type == 'tag' || github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
          name: v${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
          files: ${{ env.APK_FILES }}
          body: ${{ env.RELEASE_BODY }}
          overwrite_files: true
          fail_on_unmatched_files: false
